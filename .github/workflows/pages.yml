name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A3F027: ${{ secrets.A3F027 }}
          B7DBC1: ${{ secrets.B7DBC1 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A3F027', '')
          bm = os.environ.get('B7DBC1', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 15ecb9af591a20e20b3450b4513e4469cb8bf58a98 -->', gm)
              s2 = s2.replace('<!-- 6b5c89c0c23bf1e1b2bdb291338ac0715c -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
